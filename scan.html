<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>APEX — Live Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--g:#1ed760;--a:#f0a52a;--r:#ff4b4b;--mut:#7d7d83;--ln:#222227}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#0a0a0c;color:#fff;font-family:'Inter',sans-serif;display:flex;justify-content:center;min-height:100vh}
.dev{width:100%;max-width:430px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;padding:22px 20px 30px}
.brand{font-family:'Archivo';font-weight:900;letter-spacing:3px;font-size:15px;text-align:center;margin-bottom:4px}
.tag{text-align:center;color:var(--mut);font-size:11px;font-family:'Space Mono';letter-spacing:.5px;margin-bottom:20px}
h1{font-family:'Archivo';font-weight:900;font-size:25px;letter-spacing:-.5px;margin:0 0 6px;text-transform:uppercase}
.s{color:var(--mut);font-size:13px;line-height:1.5;margin:0 0 16px}
.up{border:1.5px dashed #34343a;border-radius:16px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;overflow:hidden;position:relative;background:#0e0e10}
.up img{width:100%;height:100%;object-fit:cover}
.up .ph{color:var(--mut);font-size:12.5px;text-align:center;padding:0 20px}
.up svg{stroke:#3a3a3e}
.seg{display:flex;gap:8px;margin:16px 0 6px}
.seg button{flex:1;background:#101013;border:1px solid var(--ln);color:#cfcfd3;padding:11px;border-radius:11px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.seg button.on{border-color:var(--g);color:#fff;background:rgba(30,215,96,.08)}
.lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin:14px 0 7px;font-family:'Space Mono'}
.age{display:flex;align-items:center;gap:12px}
.age input{flex:1}.age b{font-family:'Archivo';font-weight:900;font-size:20px;color:var(--a);min-width:34px;text-align:right}
.cta{margin-top:auto;background:var(--g);color:#04240f;border:none;border-radius:13px;padding:16px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:.2px}
.cta:disabled{opacity:.4}
.cap{text-align:center;color:var(--mut);font-size:11px;margin-top:11px;display:flex;gap:14px;justify-content:center}
.note{background:rgba(240,165,42,.1);border:1px solid rgba(240,165,42,.35);color:#f5c97e;font-size:12px;line-height:1.5;border-radius:11px;padding:11px 13px;margin-bottom:14px}
/* result */
.ring{display:flex;flex-direction:column;align-items:center;margin:6px 0 4px}
.ringnum{font-family:'Archivo';font-weight:900;font-size:64px;line-height:1}
.ringsub{font-size:12px;color:var(--mut);margin-top:2px}
.chips{display:flex;gap:8px;margin:14px 0}
.chip{flex:1;background:#101013;border:1px solid var(--ln);border-radius:11px;padding:10px;text-align:center}
.chip b{font-family:'Archivo';font-weight:900;font-size:21px;display:block}.chip span{font-size:10px;color:var(--mut)}
.conf{text-align:center;font-size:11.5px;color:var(--mut);margin:-4px 0 10px}
.anc{text-align:center;font-size:12px;color:#cfcfd3;margin:-2px 0 14px}
.metric{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #141418}
.mn{font-size:13px;flex:1;color:#e8e8ea;text-transform:capitalize}
.bar{width:96px;height:6px;background:#1b1b1f;border-radius:3px;overflow:hidden}.bar i{display:block;height:100%}
.mv{font-family:'Archivo';font-weight:900;font-size:15px;width:30px;text-align:right}
.cols{display:flex;gap:10px;margin:14px 0}
.col{flex:1;background:#0e0e10;border:1px solid var(--ln);border-radius:11px;padding:10px 12px;font-size:12px;color:#cfcfd3}
.col .h{font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-family:'Space Mono'}
.rec{background:#0e0e10;border:1px solid var(--ln);border-radius:11px;padding:11px 13px;margin-bottom:8px}
.rec b{font-size:13px;text-transform:capitalize}.rec p{margin:4px 0 0;font-size:12.5px;color:#bcbcc2;line-height:1.45}.rec .t{font-size:10px;color:var(--mut);margin-top:4px}
.spin{width:46px;height:46px;border:3px solid #1b1b1f;border-top-color:var(--g);border-radius:50%;animation:sp 1s linear infinite;margin:40px auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.center{text-align:center;color:var(--mut);font-size:13px}
a.link{color:var(--g);text-decoration:none;font-size:12px}
</style></head>
<body><div class="dev" id="app"></div>
<input type="file" id="filein" accept="image/*" capture="user" style="display:none">
<script>
// ===== CONFIG — fill WORKER_URL after you deploy worker.js to Cloudflare (see SECURITY.md) =====
const WORKER_URL = '';          // e.g. 'https://apex-scan.katanaim.workers.dev'
const GATE = '';                // shared access code, if you set GATE in the Worker
// ============================================================================================
let PHOTO=null, SEX='female', AGE=24, RESULT=null, BUSY=false;
const band=v=> v<45?'var(--r)':v<=65?'var(--a)':'var(--g)';
const bandP=p=> p<4.5?'var(--r)':p<=6.5?'var(--a)':'var(--g)';
const app=()=>document.getElementById('app');
function form(){app().innerHTML=`
 <div class="brand">APEX</div><div class="tag">honest face analysis · True Rate Me scale</div>
 <h1>Scan your face</h1><p class="s">One clear front photo, good light, neutral expression. You get your real Looks Score, sub-scores and the exact fixes. Photo is sent only to your private backend, never stored here.</p>
 ${WORKER_URL?'':'<div class="note"><b>Backend not configured yet.</b> Deploy <code>worker.js</code> to Cloudflare and put its URL in <code>WORKER_URL</code> (top of this file). Until then the scan button is disabled — this protects your OpenRouter key (it must never live in the browser). See SECURITY.md.</div>'}
 <div class="up" id="up" onclick="document.getElementById('filein').click()">${PHOTO?`<img src="${PHOTO}">`:`<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.4"/><path d="M8 6l1.5-2h5L16 6"/></svg><div class="ph">Tap to upload a front photo</div>`}</div>
 <div class="seg"><button class="${SEX==='female'?'on':''}" onclick="SEX='female';form()">Female</button><button class="${SEX==='male'?'on':''}" onclick="SEX='male';form()">Male</button></div>
 <div class="lbl">Age</div><div class="age"><input type="range" min="14" max="70" value="${AGE}" oninput="AGE=+this.value;document.getElementById('agev').textContent=this.value"><b id="agev">${AGE}</b></div>
 <button class="cta" ${(!PHOTO||!WORKER_URL||BUSY)?'disabled':''} onclick="scan()">Scan my face — free</button>
 <div class="cap"><span>🔒 Private</span><span>🗑 Not stored</span><span>↩ Honest, not flattering</span></div>`;}
function loading(){app().innerHTML=`<div class="brand">APEX</div><div class="tag">reading your face…</div><div class="spin"></div><div class="center">Mapping features · scoring on the True Rate Me scale…</div>`;}
async function scan(){
 if(!PHOTO||!WORKER_URL)return; BUSY=true; loading();
 try{
   const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:PHOTO,sex:SEX,age:AGE,gate:GATE})});
   const d=await r.json(); if(d.error)throw new Error(d.error); RESULT=d; result();
 }catch(e){ app().innerHTML=`<div class="brand">APEX</div><h1 style="margin-top:30px">Scan failed</h1><p class="s">${e.message}</p><button class="cta" onclick="form()">Try again</button>`; }
 BUSY=false;
}
function result(){
 const d=RESULT, ss=d.sub_scores||{}, ks={harmony:'Harmony',midface:'Midface',eyes:'Eyes',skin_quality:'Skin',cheekbones:'Cheekbones',canthal_tilt:'Canthal tilt',nose_harmony:'Nose',lips:'Lips',symmetry:'Symmetry',jawline:'Jawline',masc_fem:SEX==='female'?'Femininity':'Masculinity',hairline:'Hairline'};
 const rows=Object.keys(ks).filter(k=>ss[k]!=null).sort((a,b)=>ss[b]-ss[a]).map(k=>`<div class="metric"><div class="mn">${ks[k]}</div><div class="bar"><i style="width:${ss[k]}%;background:${band(ss[k])}"></i></div><div class="mv" style="color:${band(ss[k])}">${ss[k]}</div></div>`).join('');
 const recs=(d.recommendations||[]).filter(x=>x&&x.action).slice(0,5).map(x=>`<div class="rec"><b>${x.area||''}</b><p>${x.action}</p>${x.tte?`<div class="t">⏱ ${x.tte}</div>`:''}</div>`).join('');
 app().innerHTML=`<div class="brand">APEX</div><div class="tag">your honest score</div>
  <div class="ring"><div class="ringnum" style="color:${bandP(d.psl)}">${d.psl}</div><div class="ringsub">PSL · True Rate Me scale (5.0 = average)</div></div>
  <div class="conf">confidence: ${d.confidence||'—'}</div>
  ${d.closest_anchors?`<div class="anc">closest to: ${d.closest_anchors}</div>`:''}
  <div class="chips"><div class="chip"><b style="color:${bandP(d.psl)}">${d.looks_score}</b><span>Looks Score /100</span></div>${d.psl_ceiling?`<div class="chip"><b style="color:var(--g)">${d.psl_ceiling}</b><span>Potential ceiling</span></div>`:''}</div>
  ${(d.halos&&d.halos.length)||(d.focus_areas&&d.focus_areas.length)?`<div class="cols">${d.halos&&d.halos.length?`<div class="col"><div class="h" style="color:var(--g)">Strengths</div>${d.halos.slice(0,3).map(x=>`• ${x}`).join('<br>')}</div>`:''}${d.focus_areas&&d.focus_areas.length?`<div class="col"><div class="h" style="color:var(--a)">Focus</div>${d.focus_areas.slice(0,3).map(x=>`• ${x}`).join('<br>')}</div>`:''}</div>`:''}
  <div class="lbl">Sub-scores</div>${rows}
  ${recs?`<div class="lbl">Your fixes</div>${recs}`:''}
  <button class="cta" style="margin-top:16px" onclick="PHOTO=null;RESULT=null;form()">Scan again</button>
  <div class="cap"><span>Geometry + regressor add accuracy on the full backend</span></div>`;
}
document.getElementById('filein').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{PHOTO=ev.target.result;form();};r.readAsDataURL(f);});
form();
// quick UI self-test: open ?demo=1 to see the result screen with sample data (no backend needed)
if(new URLSearchParams(location.search).get('demo')){RESULT={psl:5.4,looks_score:54,psl_ceiling:6.2,confidence:'medium',closest_anchors:'Saoirse Ronan, Brie Larson',sub_scores:{harmony:54,midface:58,eyes:66,skin_quality:62,cheekbones:48,canthal_tilt:55,nose_harmony:70,lips:60,symmetry:78,jawline:62,masc_fem:65,hairline:40},halos:['Strong symmetry','Light eye colour','Straight nose'],focus_areas:['High hairline','Narrow face (FWHR)','Mild eye tilt'],recommendations:[{area:'hairline',action:'Curtain bangs to shorten the upper third — biggest fast win.',tte:'immediate'},{area:'skin',action:'AM SPF + nightly retinoid for even tone.',tte:'4–8 wks'}]};result();}
</script></body></html>
