<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./apex-anims.js"></script>
<style>html,body{margin:0;height:100%;background:#000;overflow:hidden}#root{position:fixed;inset:0}</style>
</head>
<body>
<div id="root"></div>
<script>
  var c = new URLSearchParams(location.search).get('c');
  var C = window[c];
  if (C) { ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(C)); }
  else { document.getElementById('root').innerHTML = '<div style="color:#888;font:13px sans-serif;padding:20px">unknown component: '+c+'</div>'; }
</script>
</body>
</html>
