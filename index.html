<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APEX — how attractive are you, really?</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--green:#1ed760;--red:#ff4b4b;--amber:#f0a52a;--muted:#7d7d83;--faint:#3a3a3e;--line:#222227;--surface:#0e0e10;--mono:'Space Mono',ui-monospace,SFMono-Regular,Menlo,monospace;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{background:#000;color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,Arial,sans-serif;}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 28px;}
.mast{text-align:center;margin-bottom:11px;}
.mast h1{font-size:15px;font-weight:700;}
.mast p{font-size:11.5px;color:var(--muted);margin-top:4px;}
.mast a{color:var(--green);text-decoration:none;}
.device{width:390px;height:min(844px,calc(100vh - 130px));min-height:560px;background:radial-gradient(125% 80% at 50% 30%, #0c0c0e, #000 62%);border-radius:44px;border:1px solid #222227;box-shadow:0 0 0 9px #050506,0 22px 55px rgba(0,0,0,.65);position:relative;overflow:hidden;display:flex;flex-direction:column;}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:112px;height:28px;background:#000;border-radius:16px;z-index:40;}
.status{height:46px;flex:0 0 46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 5px;font-size:12.5px;font-weight:600;z-index:30;}
.prog{height:3px;flex:0 0 3px;margin:0 24px;background:#1c1c20;border-radius:3px;overflow:hidden;}
.prog b{display:block;height:100%;width:0;background:#fff;transition:width .5s;}
.back{position:absolute;top:50px;left:14px;z-index:35;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:none;color:#fff;font-size:18px;cursor:pointer;display:none;}
.stage{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;}
.stage::-webkit-scrollbar{width:0;}
.scr{min-height:100%;display:flex;flex-direction:column;padding:34px 26px 0;animation:fadein .35s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:400;margin-bottom:13px;}
.ulabel{font-family:var(--mono);font-size:9.5px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
h2.h{font-family:'Archivo','Helvetica Neue',sans-serif;font-size:28px;line-height:1.05;font-weight:900;letter-spacing:-.5px;text-transform:uppercase;}
p.s{font-size:14px;line-height:1.45;color:var(--muted);margin-top:11px;}
.cap{font-size:11px;color:var(--faint);margin-top:12px;text-align:center;}
.vis{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0;min-height:110px;}
.foot{flex:0 0 auto;padding:14px 26px calc(env(safe-area-inset-bottom) + 16px);position:sticky;bottom:0;background:linear-gradient(180deg,rgba(0,0,0,0),#000 24%);z-index:6;}
.cta{width:100%;border:none;border-radius:32px;padding:17px;font-size:16px;font-weight:700;background:#fff;color:#000;cursor:pointer;}
.cta:active{transform:translateY(1px);} .cta:disabled{opacity:.35;}
.sec{display:block;width:100%;text-align:center;background:none;border:none;color:var(--muted);font-size:13px;margin-top:11px;cursor:pointer;}

.draw{stroke-dasharray:1600;stroke-dashoffset:1600;animation:draw 1.3s ease forwards;}
.draw.d2{animation-delay:.35s;}.draw.d3{animation-delay:.7s;}
@keyframes draw{to{stroke-dashoffset:0;}}
.pop{opacity:0;animation:pop .5s ease forwards;}
@keyframes pop{to{opacity:1;}}
text{font-family:'Inter',Arial,sans-serif;}

.bars{width:100%;}
.barrow{margin-bottom:15px;}
.barrow .lab{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;}
.barrow .lab b{font-weight:600;} .barrow .lab span{color:var(--muted);font-weight:600;}
.track{height:10px;background:#161618;border-radius:9px;overflow:hidden;}
.fill{height:100%;border-radius:9px;transform-origin:left;transform:scaleX(0);animation:grow 1s ease forwards;background:var(--green);}
@keyframes grow{to{transform:scaleX(1);}}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%;}
.tile{background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:15px;cursor:pointer;display:flex;align-items:center;gap:12px;min-height:64px;transition:.15s;}
.tile.sel{border-color:#fff;background:#161618;}
.tile .ic{width:30px;height:30px;flex:0 0 30px;display:flex;align-items:center;justify-content:center;color:#fff;}
.tile .tl{font-size:14.5px;font-weight:600;}
.gender{display:flex;gap:14px;width:100%;}
.gcard{flex:1;background:#0e0e10;border:1px solid var(--line);border-radius:24px;padding:24px 14px;text-align:center;cursor:pointer;transition:.15s;}
.gcard:active{transform:scale(.98);} .gcard.sel{border-color:#fff;background:#161618;}
.gcard .ic{font-size:30px;margin-bottom:10px;} .gcard .gl{font-size:16px;font-weight:600;}

.slwrap{width:100%;}
.slnow{text-align:center;font-size:22px;font-weight:800;margin-bottom:18px;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:#222227;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;cursor:pointer;}
.slends{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:12px;}
.bignum{font-family:'Archivo',sans-serif;font-size:60px;font-weight:900;text-align:center;line-height:1;}

.ctrl{width:100%;}
.crow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #222227;font-size:14.5px;}
.crow .ck{width:22px;height:22px;border-radius:6px;flex:0 0 22px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.crow.y .ck{background:var(--green);color:#04240f;} .crow.n .ck{background:#222227;color:#7d7d83;}
.crow.n{color:var(--muted);}

.ringbox{position:relative;width:206px;height:206px;}
.ringbox .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ringbox .ctr b{font-family:'Archivo',sans-serif;font-size:60px;font-weight:900;line-height:1;text-shadow:0 0 16px currentColor;}
.ringbox .ctr span{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:7px;}

.metric{display:flex;justify-content:space-between;align-items:center;background:#0e0e10;border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:8px;}
.metric .mn{font-size:14px;font-weight:500;} .metric .mv{font-weight:700;font-size:16px;}
.metric.lock .mv{color:var(--faint);letter-spacing:3px;} .metric .lk{margin-left:8px;}
.rvcard{background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:10px;margin-bottom:12px;}
.rvphotos{display:flex;gap:6px;}
.rvph{position:relative;flex:1;border-radius:12px;overflow:hidden;height:152px;background:#000;}
.rvph img{width:100%;height:100%;object-fit:cover;object-position:center 30%;}
.rvph .lbl{position:absolute;top:7px;left:7px;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:5px;background:rgba(0,0,0,.6);color:#cfcfd3;}
.rvph .lbl.a{background:var(--green);color:#04240f;left:auto;right:7px;}
.rvbar{display:flex;justify-content:space-between;align-items:center;margin:11px 3px 0;}
.rvscore{font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;display:flex;align-items:center;gap:9px;}
.rvscore .ar{color:var(--muted);font-weight:400;font-family:'Inter';}
.rvscore .g,.rvname .g{color:var(--green);}
.rvname{font-size:12.5px;color:var(--muted);}
.rvq{font-size:12.5px;line-height:1.45;color:#cfcfd3;margin:9px 3px 3px;}
.rvq .st{color:var(--green);letter-spacing:1px;}
.revwrap{height:344px;overflow:hidden;position:relative;width:100%;-webkit-mask-image:linear-gradient(180deg,transparent,#000 7%,#000 90%,transparent);mask-image:linear-gradient(180deg,transparent,#000 7%,#000 90%,transparent);}
.revtrack{animation:marq 30s linear infinite;}
@keyframes marq{from{transform:translateY(0)}to{transform:translateY(-50%)}}

.vf{width:228px;height:296px;border-radius:24px;background:#0e0e10;border:1.5px solid #222227;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.vf img{width:100%;height:100%;object-fit:cover;}
.vf .face{position:absolute;width:60%;height:74%;border:2px solid rgba(255,255,255,.5);border-radius:50%/42%;}
.scanl{position:absolute;left:6%;right:6%;height:2px;background:var(--green);box-shadow:0 0 12px var(--green);animation:scanmove 2s linear infinite;}
@keyframes scanmove{0%{top:6%}100%{top:92%}}

/* analyzing */
.anbox{width:100%;}
.astep{display:flex;align-items:flex-start;gap:12px;padding:9px 0;opacity:0;animation:pop .4s ease forwards;}
.astep .ico{width:20px;height:20px;flex:0 0 20px;margin-top:1px;}
.spin{width:18px;height:18px;border:2px solid #2a2a2f;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.chk{width:20px;height:20px;border-radius:50%;background:var(--green);color:#04240f;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.astep .body .ttl{font-size:14.5px;font-weight:600;}
.astep .find{font-size:12.5px;margin-top:4px;display:flex;align-items:center;gap:7px;opacity:0;animation:pop .4s ease forwards;}
.astep .find .d{width:7px;height:7px;border-radius:50%;flex:0 0 7px;}

/* paywall */
.tier{position:relative;background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;}
.tier.sel{border-color:#fff;background:#161618;}
.tier .row{display:flex;justify-content:space-between;align-items:center;}
.tier .nm{font-size:16px;font-weight:600;} .tier .pr{font-size:16px;font-weight:700;}
.tier .meta{font-size:12.5px;color:var(--muted);margin-top:4px;}
.tier .strike{text-decoration:line-through;color:var(--faint);} .tier .save{color:var(--green);font-weight:600;}
.tier .badge{position:absolute;top:-9px;right:14px;background:#000;color:var(--muted);border:1px solid var(--line);font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 9px;border-radius:999px;}
.counter{font-size:12px;color:var(--green);text-align:center;margin-bottom:12px;}
.runway{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;}

.ov{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;animation:fadein .25s;}
.osd{width:262px;background:#1c1c20;border-radius:15px;text-align:center;overflow:hidden;}
.osd .tp{padding:18px 16px 14px;} .osd .tp b{font-size:15px;} .osd .tp p{font-size:12.5px;color:#cfcfd3;margin-top:6px;}
.osd .bt{display:flex;border-top:1px solid #2e2e33;}
.osd .bt button{flex:1;background:none;border:none;color:#0a84ff;font-size:15px;padding:12px;cursor:pointer;}
.osd .bt button+button{border-left:1px solid #2e2e33;font-weight:600;}

.unlock{display:flex;align-items:center;justify-content:center;}
.statrow{display:flex;gap:10px;margin:6px 0 14px;}
.statchip{flex:1;background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:12px 8px;text-align:center;}
.statchip b{font-family:'Archivo';font-weight:900;font-size:24px;display:block;line-height:1;}
.statchip span{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.prov{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;border:none;background:#fff;color:#111;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer;}
.field{width:100%;padding:14px 16px;border-radius:12px;background:#0e0e10;border:1px solid var(--line);color:#fff;font-size:15px;}
.planbanner{background:var(--surface);border:1px solid var(--line);border-left:2px solid var(--green);border-radius:16px;padding:16px;margin-bottom:6px;}
.planbanner .pd{font-family:'Archivo';font-weight:900;font-size:24px;}
.planbanner .pg{font-size:12.5px;color:var(--muted);margin-top:3px;}
.ptrack{height:6px;background:#1c1c20;border-radius:6px;margin-top:11px;overflow:hidden;}
.pfill{height:100%;background:var(--green);border-radius:6px;box-shadow:0 0 8px rgba(30,215,96,.5);}
.task{display:flex;align-items:center;gap:12px;background:#0e0e10;border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;font-size:14.5px;cursor:pointer;}
.task .tb{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);flex:0 0 22px;}
.task.done{color:var(--muted);text-decoration:line-through;}
.task.done .tb{background:var(--green);border-color:var(--green);}
.hint{font-size:12px;color:var(--muted);}
.homehead{font-family:'Archivo';font-weight:900;font-size:18px;letter-spacing:2px;padding:2px 0 12px;}
.scorebig{display:flex;justify-content:space-between;align-items:flex-end;background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:16px;}
.lbl2{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.bn{font-family:'Archivo';font-weight:900;font-size:38px;line-height:1;margin-top:4px;}
.gapbar{height:8px;background:#1c1c20;border-radius:8px;margin-top:12px;overflow:hidden;}
.gapfill{height:100%;background:linear-gradient(90deg,#f0a52a,#1ed760);border-radius:8px;}
.cap2{font-family:var(--mono);font-size:9.5px;fill:#7d7d83;}
.cap2g{font-family:var(--mono);font-size:9.5px;fill:#1ed760;}
.tabbar{display:flex;justify-content:space-around;border-top:1px solid var(--line);padding:9px 0 5px;background:#000;}
.tabbar .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--faint);cursor:pointer;}
.tabbar .tab.on{color:var(--green);}
.tabbar .ic{font-size:18px;line-height:1;}
.iaptile{display:flex;align-items:center;justify-content:space-between;background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px;}
.iaptile b{font-size:14.5px;font-weight:600;}
.iaptile .ip{font-size:12px;color:var(--muted);margin-top:3px;}
.iaptile .price{font-family:'Archivo';font-weight:900;color:var(--green);font-size:16px;}
.iaptile .lk{color:var(--green);font-size:18px;}
.chat{display:flex;flex-direction:column;gap:10px;margin:8px 0;}
.cb{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.4;}
.cb.user{align-self:flex-end;background:#1c1c20;color:#fff;}
.cb.ai{align-self:flex-start;background:#0e0e10;border:1px solid var(--line);}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.chip2{background:#0e0e10;border:1px solid var(--line);border-radius:12px;padding:8px 13px;font-size:12.5px;color:#cfcfd3;cursor:pointer;}
.deg{font-family:var(--mono);font-size:11px;font-weight:700;}
.cl{font-family:var(--mono);font-size:8.5px;fill:#7d7d83;text-transform:uppercase;}
.clv{font-family:var(--mono);font-size:13px;font-weight:700;}
.repcols{display:flex;gap:10px;margin-bottom:4px;}
.repcol{flex:1;background:#0e0e10;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13px;color:#cfcfd3;}
.repcol .rh{font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:700;}
.ptrack{position:relative;}
.mile{position:absolute;top:0;width:2px;height:100%;background:#3a3a3e;transform:translateX(-1px);}
.mile.next{background:#1ed760;}
.milelbl{font-size:11px;color:#1ed760;margin-top:8px;}
.reward{background:rgba(30,215,96,.12);border:1px solid #1ed760;border-radius:12px;padding:12px 14px;font-size:13px;color:#dff5e6;margin-top:6px;animation:pop .4s ease;}
.prog2{background:#0e0e10;border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px;}
.prog2 .p2t{display:flex;justify-content:space-between;align-items:baseline;}
.prog2 .p2t b{font-size:14.5px;font-weight:600;}.prog2 .p2t span{font-size:12px;color:var(--muted);}
.p2track{height:6px;background:#1c1c20;border-radius:6px;margin-top:9px;overflow:hidden;}
.p2fill{height:100%;border-radius:6px;}
.animframe{width:calc(100% + 52px);margin:0 -26px;height:420px;border:none;background:#000;display:block;}
.glowframe{width:100%;height:330px;border:none;border-radius:14px;background:#000;display:block;}
.tb{display:flex;gap:9px;align-items:center;margin-top:14px;background:#121216;border:1px solid #222227;border-radius:13px;padding:7px 9px;max-width:390px;width:100%;}
.tb button{background:#222228;border:none;color:#fff;border-radius:8px;padding:9px 13px;font-size:14px;cursor:pointer;}
.tb select{flex:1;min-width:0;background:#1c1c20;color:#fff;border:1px solid #2a2a30;border-radius:8px;padding:8px;font-size:12px;}
.dbgcl{font-size:11px;color:var(--muted);margin-top:6px;}
</style>
</head>
<body>
<div class="page">
  <div class="mast"><h1>APEX</h1><p>rate-my-face · interactive prototype</p></div>
  <div class="device">
    <div class="notch"></div>
    <div class="status"><span>9:41</span><span>●●●  ✦  100</span></div>
    <button class="back" id="back" onclick="back()">‹</button>
    <div class="prog"><b id="progb"></b></div>
    <div class="stage" id="stage"></div>
  </div>
  <div class="tb"><button onclick="back()">◀</button><select id="jump" onchange="goTo(this.selectedIndex)"></select><button onclick="next()">▶</button></div>
  <div class="dbgcl" id="cl"></div>
</div>
<input type="file" id="filein" accept="image/*" style="display:none">

function faceReticle(){return `<svg viewBox="0 0 300 300" width="230" height="230">
  <path class="draw" d="M150 58 C108 58 86 96 86 150 C86 205 116 248 150 248 C184 248 214 205 214 150 C214 96 192 58 150 58Z" fill="none" stroke="#fff" stroke-width="2"/>

function build(s){
  const head=`${s.kick?`<div class="kicker">${esc(s.kick)}</div>`:''}${s.h?`<h2 class="h ${/[a-z]/.test(s.h)&&s.h.length>26?'mix':''}">${esc(s.h)}</h2>`:''}${s.s?`<p class="s">${esc(s.s)}</p>`:''}`;
  const foot=s.cta?`<div class="foot"><button class="cta" onclick="next()">${esc(s.cta)}</button></div>`:'';
  let vis='';
  switch(s.k){
   case 'cold': return `<div class="scr"><div class="vis" style="flex:1">${faceReticle()}</div><h2 class="h" style="text-align:center">${esc(s.h)}</h2><p class="s" style="text-align:center;margin-top:8px">${esc(s.s||'')}</p><div class="foot"><button class="cta" onclick="next()">${esc(s.cta||'Continue')}</button><div class="cap" style="margin-top:10px">No account · no card</div></div></div>`;
   case 'halo': vis=haloBars()+(s.cap?`<div class="cap">${esc(s.cap)}</div>`:''); break;
   case 'faceangles': vis=faceAngles(null); break;
   case 'ratio': vis=ratioGrid(); break;
   case 'pyramid': vis=datingPyramid(); break;
   case 'controllable': vis=controllable(); break;
   case 'potential': vis=potentialGraph(null,null,false); break;
   case 'motdisc': vis=motVsDisc(); break;
   case 'climb': vis=climb(); break;
   case 'gender': vis=`<div class="gender"><div class="gcard" onclick="pickCard(this)"><div class="gl">Male</div></div><div class="gcard" onclick="pickCard(this)"><div class="gl">Female</div></div></div>`; break;
   case 'age': vis=`<div class="slwrap"><div class="bignum" id="ageval">24</div><input type="range" min="14" max="70" value="24" oninput="document.getElementById('ageval').textContent=this.value" style="margin-top:22px"><div class="slends"><span>14</span><span>70</span></div></div>`; break;
   case 'goals': vis=`<div class="tiles">${s.data.map(t=>`<div class="tile" onclick="pickGoal(this,'${t[0]}')"><div class="ic">${ic[t[1]]||''}</div><div class="tl">${t[0]}</div></div>`).join('')}</div>`; break;
   case 'slider': vis=`<div class="slwrap"><div class="slnow" id="slv">${s.ends[0]}</div><input type="range" min="0" max="100" value="50" oninput="document.getElementById('slv').textContent=this.value<33?'${s.ends[0]}':this.value<66?'Sometimes':'${s.ends[1]}'"><div class="slends"><span>${s.ends[0]}</span><span>${s.ends[1]}</span></div></div>`; break;
   case 'rating': vis=`<div class="slwrap"><div class="bignum" id="rtv" style="color:#f0a52a">5</div><input type="range" min="1" max="10" value="5" oninput="rt(this.value)" style="margin-top:22px"><div class="slends"><span>1</span><span>10</span></div></div>`; break;
   case 'reviews': vis=reviewsCarousel(); break;
   case 'scanintro': vis=faceReticle()+'<div style="display:flex;gap:16px;justify-content:center;margin-top:18px;font-size:11px;color:#7d7d83"><span style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7d7d83" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Private</span><span style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7d7d83" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6.5 7l1 12a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1l1-12"/></svg>Auto-deleted</span><span style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7d7d83" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18M10.6 10.7a2 2 0 0 0 2.8 2.8M9.4 5.2A9 9 0 0 1 21 12a14 14 0 0 1-2.2 3M6.1 6.1A13.8 13.8 0 0 0 3 12a9 9 0 0 0 11 6.9"/></svg>Never shared</span></div>'; break;
   case 'perm': return `<div class="scr">${head}<div class="vis">${faceReticle()}</div><div class="foot"><button class="cta" onclick="next()">${esc(s.cta)}</button></div><div class="ov" id="ov"><div class="osd"><div class="tp"><b>“APEX” Would Like to Access the Camera</b><p>To scan and score your face.</p></div><div class="bt"><button onclick="document.getElementById('ov').remove()">Don't Allow</button><button onclick="next()">Allow</button></div></div></div>`;
   case 'capture': vis=`<div class="vf" onclick="document.getElementById('filein').click()">${PHOTO?`<img src="${PHOTO}">`:`<div class="face"></div>`}<div class="scanl"></div></div>`; break;
   case 'analyzing': return `<div class="scr">${head}<div class="vis" style="justify-content:flex-start;padding-top:6px"><div style="margin-bottom:6px">${faceAngles(PHOTO)}</div><div class="anbox" id="anbox"></div><div style="text-align:center;font-size:12px;color:#7d7d83;margin-top:12px">You called yourself a <b style="color:#fff">${SELF}</b>/10. The real number's next.</div></div><div class="foot"><button class="cta" id="anCta" onclick="next()" disabled>${esc(s.cta)}</button></div></div>`;
   case 'reveal': return `<div class="scr"><h2 class="h" style="text-align:center;margin:10px 0 2px">You scored 67.</h2><div style="text-align:center;font-size:12.5px;color:#7d7d83;margin-bottom:4px">You guessed <b style="color:#fff">${SELF}</b>/10 — your real floor is <b style="color:#f0a52a">6.7</b>. Free, no paywall.</div><div class="vis" style="flex:1;gap:12px">${scoreRing(67,'#f0a52a')}<div class="pop" style="animation-delay:1.1s;text-align:center"><div style="font-size:13px;color:#7d7d83">your ceiling</div><div style="font-family:'Archivo',sans-serif;font-size:24px;font-weight:900;color:#1ed760">81</div><div style="font-size:12px;color:#7d7d83;margin-top:4px">reach it by Sep 13 · 90 days</div></div><div class="pop" style="animation-delay:1.55s;text-align:center;max-width:300px"><div style="font-family:'Archivo',sans-serif;font-weight:900;font-size:16px;text-transform:uppercase;letter-spacing:-.3px">That's your floor — not your face.</div><div style="font-size:12px;color:#7d7d83;margin-top:6px;line-height:1.4">You're 14 points under your ceiling — most of it is skin, hair, body &amp; grooming, the part nobody's working on yet.</div></div></div>${foot}`;
   case 'potplan': vis='<iframe class="glowframe" src="glow/glowup.html" title="Your glow-up curve" scrolling="no"></iframe>'; break;
   case 'report': vis=fullReport(); break;
   case 'anim': return animScreen(s);
   case 'paywall': return paywall();
   case 'confirmed': return confirmedScreen(s);
   case 'reportfull': return reportFull(s);
   case 'plan': return planScreen(s);
   case 'notif': return notifScreen(s);
   case 'home': return homeScreen();
  }
  return `<div class="scr">${head}<div class="vis">${vis}</div>${foot}</div>`;
}

function paywall(){return `<div class="scr"><div class="kicker">Your report is built</div><h2 class="h">See your full report + 90-day plan.</h2>
  <p class="s" style="margin-top:9px">You came to fix ${goalsPhrase(2)}. This is the plan that closes the gap from 6.7 to your 8.1 ceiling — about 11¢ a day.</p>
  <div style="margin-top:12px;display:flex;flex-direction:column;gap:7px">${['All 10 sub-scores','Your weakest-link fix order','Your 90-day daily plan','Free re-scan every 10 days','AI coach — unlimited text'].map(x=>`<div style="display:flex;align-items:center;gap:9px;font-size:13px;color:#e8e8ea"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1ed760" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M4 12l5 5L20 6"/></svg>${x}</div>`).join('')}</div>
  <div class="counter" style="margin-top:13px">41 unlocked in the last hour · join 10,000+ on their plan</div>
  <div id="tiers">${TIERS.map((t,i)=>`<div class="tier ${i===0?'sel':''}" onclick="pickTier(${i})">${t.badge?`<span class="badge">${t.badge}</span>`:''}<div class="row"><div class="nm">${t.nm}</div><div class="pr">${t.pr}</div></div><div class="meta">${t.meta}</div></div>`).join('')}</div>
  <div style="text-align:center;font-size:11px;color:var(--faint);margin-top:7px">Annual auto-renews at $39.99/yr · cancel anytime in 2 taps</div>
  <div style="display:flex;align-items:center;gap:7px;justify-content:center;margin-top:10px;font-size:11.5px;color:var(--muted)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7d7d83" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.8-7 9-4-1.2-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg>Deterministic 68-point analysis · reproducible, not a vibe</div>
  <div style="text-align:center;font-size:12.5px;color:var(--muted);line-height:1.45;margin:11px 2px 0">“Spent $200 on skincare that did nothing. This was $40 and finally told me what to fix — hit a 7 in two months.” <span style="color:#cfcfd3">— Daniel R., verified</span></div>
  <div class="runway">Day 1 of 90 starts the moment you unlock. Sep 13 is your date — only if you start today.</div>
  <div class="foot"><button class="cta" id="payc" onclick="next()">${TIERS[0].cta}</button><button class="sec">Cancel anytime in 2 taps · Restore</button></div></div>`;}

/* sequential analysis */
function startAnalyze(){
  const box=document.getElementById('anbox'); if(!box) return;
  const steps=[
   {load:'Mapping 68 landmarks',finds:[['Defined brow ridge','#1ed760']]},
   {load:'Measuring proportions',finds:[['Balanced facial thirds','#1ed760'],['Midface slightly long','#f0a52a']]},
   {load:'Scoring skin & symmetry',finds:[['Strong symmetry','#1ed760'],['Skin texture: improvable','#f0a52a']]},
   {load:'Calculating Looks Score',finds:[]},
  ];
  let t=300;
  steps.forEach((st,i)=>{
    setTimeout(()=>{ if(!document.getElementById('anbox'))return;
      const row=document.createElement('div'); row.className='astep'; row.id='as'+i;
      row.innerHTML=`<div class="ico"><div class="spin"></div></div><div class="body"><div class="ttl">${st.load}</div></div>`;
      box.appendChild(row);
    },t);
    t+=750;
    setTimeout(()=>{ const row=document.getElementById('as'+i); if(!row)return;
      row.querySelector('.ico').innerHTML='<div class="chk"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#04240f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></div>';
      const body=row.querySelector('.body');
      st.finds.forEach((f,fi)=>{ const fd=document.createElement('div'); fd.className='find'; fd.style.animationDelay=(fi*0.18)+'s';
        fd.innerHTML=`<span class="d" style="background:${f[1]}"></span>${f[0]}`; body.appendChild(fd); });
    },t);
    t+=520;
  });
  setTimeout(()=>{ const c=document.getElementById('anCta'); if(c)c.disabled=false; },t+200);
}

function animScreen(s){return `<div class="scr"><div class="vis" style="padding:0;align-items:stretch"><iframe class="animframe" src="glow/anim.html?c=${s.c}" title="${s.c}" scrolling="no"></iframe></div><div class="foot"><button class="cta" onclick="next()">${esc(s.cta||'Continue')}</button></div></div>`;}
function glowSetup(fr){try{const d=fr.contentDocument;if(!d)return;const st=d.createElement('style');st.textContent='*:has(> button[aria-label*=\'Play\']){display:none!important;} #__bundler_loading{display:none!important;}';if(d.head)d.head.appendChild(st);const pb=[...d.querySelectorAll('button')].find(b=>(b.getAttribute('aria-label')||'').includes('Play'));if(pb)setTimeout(()=>{try{pb.click();}catch(e){}},80);}catch(e){}}
function render(){
  const s=S[idx];
  document.getElementById('jump').selectedIndex=idx;
  document.getElementById('cl').textContent=`Screen ${idx+1} / ${S.length} · ${s.ph}`;
  document.getElementById('back').style.display=idx>0?'block':'none';
  document.getElementById('progb').style.width=Math.min(100,(idx/(S.length-1))*100)+'%';
  const st=document.getElementById('stage'); st.innerHTML=build(s); st.scrollTop=0;
  if(s.k==='goals'){const gc=st.querySelector('.foot .cta'); if(gc)gc.disabled=true;}
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-off]').forEach(c=>c.style.strokeDashoffset=c.getAttribute('data-off'));
    const srn=document.getElementById('srn'); if(srn){let n=0;const t=setInterval(()=>{n+=2;if(n>=67){n=67;clearInterval(t);}srn.textContent=n;},22);}
  });
  if(s.k==='analyzing') startAnalyze();
  if(s.auto){clearTimeout(window._at); window._at=setTimeout(()=>{if(S[idx]===s)next();},2200);}
}
function rt(v){SELF=+v;const e=document.getElementById('rtv');e.textContent=v;e.style.color=v<4?'#ff4b4b':v<7?'#f0a52a':'#1ed760';}
function pickGoal(el,label){el.classList.toggle('sel');if(el.classList.contains('sel')){if(!GOALS.includes(label))GOALS.push(label);}else{GOALS=GOALS.filter(g=>g!==label);}const scr=el.closest('.scr');const c=scr&&scr.querySelector('.foot .cta');if(c)c.disabled=!scr.querySelector('.tile.sel');}
function goalsPhrase(n){if(!GOALS.length)return 'your face';const g=GOALS.slice(0,n).map(x=>x.toLowerCase());return g.length===1?g[0]:g.slice(0,-1).join(', ')+' and '+g[g.length-1];}
function pickCard(el){el.parentNode.querySelectorAll('.gcard').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');setTimeout(next,260);}
function pickTier(i){document.querySelectorAll('.tier').forEach((t,j)=>t.classList.toggle('sel',j===i));document.getElementById('payc').textContent=TIERS[i].cta;}
document.getElementById('filein').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{PHOTO=ev.target.result;render();};r.readAsDataURL(f);});
function next(){if(idx<S.length-1){idx++;render();}}
function back(){if(idx>0){idx--;render();}}
function goTo(i){idx=Math.max(0,Math.min(S.length-1,i));render();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')back();});
document.getElementById('jump').innerHTML=S.map((s,i)=>`<option>${i+1}. ${s.ph} — ${(s.h||s.k).slice(0,32)}</option>`).join('');
render();
</script>
